<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#1a3a40"/>
      <stop offset="100%" stop-color="#0b1a1e"/>
    </radialGradient>
    <radialGradient id="rim" cx="50%" cy="50%" r="50%">
      <stop offset="68%" stop-color="#00dbe9" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00dbe9" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="shine" cx="33%" cy="28%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="c">
      <circle cx="16" cy="16" r="13"/>
    </clipPath>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Canvas background (transparent — works on any tab bar color) -->
  <rect width="32" height="32" rx="7" fill="#131313"/>

  <!-- Globe fill -->
  <circle cx="16" cy="16" r="13" fill="url(#bg)"/>

  <!-- Globe grid lines, clipped inside sphere -->
  <g clip-path="url(#c)" fill="none" stroke="#00dbe9" stroke-linecap="round">
    <!-- Equator -->
    <ellipse cx="16" cy="16" rx="13" ry="3.5" stroke-width="0.85" opacity="0.75"/>
    <!-- Upper latitude -->
    <ellipse cx="16" cy="10.5" rx="10.2" ry="2.6" stroke-width="0.7" opacity="0.55"/>
    <!-- Lower latitude -->
    <ellipse cx="16" cy="21.5" rx="10.2" ry="2.6" stroke-width="0.7" opacity="0.55"/>
    <!-- Central meridian (vertical great circle) -->
    <ellipse cx="16" cy="16" rx="4" ry="13" stroke-width="0.85" opacity="0.65"/>
    <!-- Offset meridian -->
    <ellipse cx="16" cy="16" rx="10.5" ry="13" stroke-width="0.7" opacity="0.4"/>
  </g>

  <!-- Rim glow -->
  <circle cx="16" cy="16" r="13" fill="url(#rim)"/>

  <!-- Specular highlight -->
  <circle cx="16" cy="16" r="13" fill="url(#shine)"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#00dbe9" stroke-width="1.1" opacity="0.9"/>

  <!-- Destination target crosshair in upper-right quadrant -->
  <g filter="url(#glow)">
    <!-- Target ring -->
    <circle cx="21.5" cy="10.5" r="2.5" fill="none" stroke="#00dbe9" stroke-width="1.1"/>
    <!-- Center dot -->
    <circle cx="21.5" cy="10.5" r="1" fill="#00dbe9"/>
    <!-- Four tick marks radiating outward -->
    <line x1="21.5" y1="8.4"  x2="21.5" y2="7.3"  stroke="#00dbe9" stroke-width="1" stroke-linecap="round"/>
    <line x1="21.5" y1="12.6" x2="21.5" y2="13.7" stroke="#00dbe9" stroke-width="1" stroke-linecap="round"/>
    <line x1="19.4" y1="10.5" x2="18.3" y2="10.5" stroke="#00dbe9" stroke-width="1" stroke-linecap="round"/>
    <line x1="23.6" y1="10.5" x2="24.7" y2="10.5" stroke="#00dbe9" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>
